    <!-- Photo Modal -->
    <div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="photoModalTitle">Photo</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <img id="photoModalImg" src="" alt="" class="img-fluid mb-3" />
            <p id="photoModalDesc" class="text-muted"></p>
          </div>
        </div>
      </div>
    </div>
    <script src="js/bootstrap5.3.2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Populate modal from triggering element using Bootstrap's event API
      var photoModal = document.getElementById('photoModal');
      if (photoModal) {
        photoModal.addEventListener('show.bs.modal', function (event) {
          var trigger = event.relatedTarget; // element that triggered the modal
          if (!trigger) return;
          var title = trigger.getAttribute('data-bs-title') || '';
          var desc = trigger.getAttribute('data-bs-desc') || '';
          var img = trigger.getAttribute('data-bs-img') || '';
          var modalTitle = photoModal.querySelector('#photoModalTitle');
          var modalImg = photoModal.querySelector('#photoModalImg');
          var modalDesc = photoModal.querySelector('#photoModalDesc');
          if (modalTitle) modalTitle.textContent = title;
          if (modalImg) { modalImg.src = img; modalImg.alt = title; }
          if (modalDesc) modalDesc.textContent = desc;
        });
      }

    </script>
